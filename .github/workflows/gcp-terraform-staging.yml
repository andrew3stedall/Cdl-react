name: GCP Terraform Staging

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/gcp-terraform-staging.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: gcp-terraform-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_WORKING_DIR: infra/terraform/environments/staging

jobs:
  validate:
    name: Terraform fmt and validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -recursive -check

      - name: Terraform init without backend
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate -no-color

  authenticated-plan:
    name: Authenticated staging plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    environment: staging

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_STAGING_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_STAGING_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_STAGING_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform init without backend
        run: terraform init -backend=false -input=false

      - name: Terraform plan without apply
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -var="project_id=${{ vars.GCP_STAGING_PROJECT_ID }}"
