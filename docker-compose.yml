services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cdl
      POSTGRES_USER: cdl
      POSTGRES_PASSWORD: cdl
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdl -d cdl"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - cdl-postgres-data:/var/lib/postgresql/data

volumes:
  cdl-postgres-data:
